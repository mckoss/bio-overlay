<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bio-overlay · setup</title>
    <link rel="stylesheet" href="config.css" />
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1>bio-overlay setup</h1>
        <p class="path">Editing <code id="config-path">config.json</code></p>
      </header>

      <section>
        <div class="section-head">
          <h2>Participants</h2>
          <button id="add" class="btn">+ Add participant</button>
        </div>
        <div id="participants" class="participants"></div>
      </section>

      <section>
        <div class="section-head">
          <h2>Pair a strap</h2>
          <button id="scan" class="btn">Scan for straps</button>
        </div>
        <p class="hint">
          Make sure each strap is worn (or its electrodes dampened) so it
          advertises, then scan and assign it to a participant.
        </p>
        <div id="scan-results" class="scan-results"></div>
      </section>

      <footer>
        <button id="save" class="btn btn-primary">Save config</button>
        <span id="status" class="status"></span>
      </footer>
      <p class="note">
        Changes take effect the next time you start <code>bio-overlay run</code>.
      </p>
    </main>
    <script src="config.js"></script>
  </body>
</html>
