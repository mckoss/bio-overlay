name: Release

# Build single-file executables for macOS and Windows and publish them as a
# GitHub Release. Triggered by pushing a version tag (e.g. v1.0.0); the tag
# list on the Releases page is the release history. Can also be run manually
# (workflow_dispatch) to produce build artifacts without a release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos-arm64
            asset: bio-overlay-macos-arm64
            binary: bio-overlay
          - os: windows-latest
            label: windows-x64
            asset: bio-overlay-windows-x64.exe
            binary: bio-overlay.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pyinstaller

      - name: Build executable
        run: pyinstaller packaging/bio-overlay.spec --noconfirm

      - name: Smoke test (--version)
        shell: bash
        run: ./dist/${{ matrix.binary }} --version

      - name: Rename for release
        shell: bash
        run: |
          mkdir -p out
          cp "dist/${{ matrix.binary }}" "out/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
